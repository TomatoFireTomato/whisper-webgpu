name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    outputs:
      zip-name: sidebar-whisper-dist.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          EXTENSION_PUBLIC_KEY: ${{ secrets.EXTENSION_PUBLIC_KEY }}
        run: npm run build

      - name: Pack extension zip
        run: cd dist && zip -r ../sidebar-whisper-dist.zip .

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidebar-whisper-release-zip
          path: sidebar-whisper-dist.zip
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sidebar-whisper-dist.zip
          generate_release_notes: true

  publish-chrome-web-store:
    needs: build-release
    runs-on: ubuntu-latest
    if: vars.CWS_EXTENSION_ID != '' && vars.CWS_PUBLISHER_ID != ''
    steps:
      - name: Download release zip artifact
        uses: actions/download-artifact@v4
        with:
          name: sidebar-whisper-release-zip

      - name: Check Chrome Web Store credentials
        id: cws-config
        env:
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "${CWS_SERVICE_ACCOUNT_JSON}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "Chrome Web Store publish skipped: missing CWS_SERVICE_ACCOUNT_JSON secret."
          fi

      - name: Authenticate to Google Cloud
        if: steps.cws-config.outputs.ready == 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Upload package to Chrome Web Store
        if: steps.cws-config.outputs.ready == 'true'
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CWS_EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -X POST \
            -T sidebar-whisper-dist.zip \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload"

      - name: Publish package to Chrome Web Store
        if: steps.cws-config.outputs.ready == 'true'
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CWS_EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:publish"
