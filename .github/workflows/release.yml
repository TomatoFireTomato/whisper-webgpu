name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    outputs:
      zip-name: sidebar-whisper-dist.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          EXTENSION_PUBLIC_KEY: ${{ secrets.EXTENSION_PUBLIC_KEY }}
        run: npm run build

      - name: Pack extension zip
        run: cd dist && zip -r ../sidebar-whisper-dist.zip .

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidebar-whisper-release-zip
          path: sidebar-whisper-dist.zip
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sidebar-whisper-dist.zip
          generate_release_notes: true
